name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ─── Stap 1: Testen + JaCoCo rapport genereren ───────────────────
      - name: Run tests & generate JaCoCo coverage
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: ./gradlew clean test jacocoTestReport --no-daemon

      # ─── Stap 2: JaCoCo HTML rapport uploaden ─────────────────────────
      - name: Upload JaCoCo HTML rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-rapport
          path: build/reports/jacoco/test/html/
          retention-days: 14

      # ─── Stap 3: Testresultaten uploaden ─────────────────────────────
      - name: Upload testresultaten
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-resultaten
          path: build/reports/tests/test/
          retention-days: 14

      # ─── Stap 4: SonarQube analyse ────────────────────────────────────
      - name: SonarQube analyse
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Winksluizeman_BuffelSimulatorBackend
            -Dsonar.organization=winksluizeman
            -Dsonar.java.binaries=build/classes/java/main
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.exclusions=**/codegen/**,**/generated/**
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

      # ─── Stap 5: JAR bouwen ───────────────────────────────────────────
      - name: Build application JAR
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: ./gradlew bootJar --no-daemon

      # ─── Stap 6: Docker image bouwen ─────────────────────────────────
      - name: Build Docker image
        run: docker build -t backend-app:${{ github.sha }} .