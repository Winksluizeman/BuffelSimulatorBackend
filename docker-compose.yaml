services:
  frontend:
    build: "C:/School/Semester 4/Opdrachten/Persoonlijke opdracht/BuffelSimulatorFrontend"
    container_name: buffelfrontend
    ports:
      - "4200:4200"
    command: npm start
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: "C:/School/Semester 4/Opdrachten/Persoonlijke opdracht/BuffelSimulatorBackend"
    container_name: buffelbackend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/buffel
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Appel12
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15
    container_name: buffeldb
    environment:
      POSTGRES_DB: buffel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Appel12
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buffel"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - app-network

  sonar-db:
    image: postgres:15
    container_name: sonar-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  sonar_date:
  sonar_logs:
  sonar_db_data:

  pgdata: